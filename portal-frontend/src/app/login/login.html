<div class="login-wrapper">
  <div class="login-card">
    <div class="login-header">
      <div class="logo-container">
        <img src="assets/images/trainhub_logo.png" alt="TrainHub Logo" class="main-logo">
      </div>
      <h1>Student Portal</h1>
      <p>Log in to access your dashboard and courses</p>
    </div>

    <div class="message" [ngClass]="message.type" *ngIf="message.text">
      {{ message.text }}
    </div>

    <form (submit)="handleLogin()">
      <div class="form-group">
        <label>Email Address</label>
        <div class="input-container">
          <i class="fas fa-envelope"></i>
          <input type="email" [(ngModel)]="loginData.email" name="email" required placeholder="name@example.com" class="premium-input">
        </div>
      </div>

      <div class="form-group" *ngIf="isAdmin">
        <label>Password</label>
        <div class="input-container">
          <i class="fas fa-lock"></i>
          <input type="password" [(ngModel)]="loginData.password" name="password" required placeholder="••••••••" class="premium-input">
        </div>
      </div>

      <div class="form-group" *ngIf="!isAdmin">
        <label>Phone Number</label>
        <div class="input-container">
          <i class="fas fa-phone"></i>
          <input type="tel" [(ngModel)]="loginData.phone" name="phone" required placeholder="1234567890" class="premium-input">
        </div>
      </div>

      <button type="submit" class="btn-premium btn-primary full-width-btn" [disabled]="isLoading">
        <span *ngIf="!isLoading"><i class="fas fa-sign-in-alt"></i> Login</span>
        <span *ngIf="isLoading"><i class="fas fa-spinner fa-spin"></i> Processing...</span>
      </button>

      <div class="action-footer">
        <button type="button" (click)="toggleAdmin()" class="toggle-link">
          {{ isAdmin ? 'Switch to Student Login' : 'Admin Login Required?' }}
        </button>
      </div>

      <div class="signup-prompt">
        Don't have an account? <a routerLink="/signup">Create one now</a>
      </div>
    </form>
  </div>
</div>
