<nav class="navbar">
  <div class="navbar-content">
    <div class="logo-area">
      <img src="assets/images/trainhub_logo.png" alt="Logo" class="nav-logo">
      <span class="brand-name">TrainHub Admin</span>
    </div>
    <div class="nav-actions">
      <a routerLink="/admin-dashboard" class="back-link"><i class="fas fa-arrow-left"></i> Back to Dashboard</a>
    </div>
  </div>
</nav>

<div class="admin-container">
  <header class="page-header">
    <div class="header-main">
      <h1>Edit Student Profile</h1>
      <p>Updating records for: <strong>{{ studentData.name }}</strong></p>
    </div>
    <div class="header-actions">
      <button class="btn-premium btn-secondary" routerLink="/admin-dashboard">Cancel</button>
      <button class="btn-premium btn-primary" (click)="saveStudent()">
        <i class="fas fa-save"></i> Save Changes
      </button>
    </div>
  </header>

  <div class="edit-grid">
    <div class="form-card premium-card">
      <section class="form-section">
        <h3><i class="fas fa-id-card"></i> Personal Information</h3>
        <div class="grid-2">
          <div class="form-group">
            <label>Full Name</label>
            <input type="text" [(ngModel)]="studentData.name" class="premium-input">
          </div>
          <div class="form-group">
            <label>Email Address (read-only)</label>
            <input type="email" [(ngModel)]="studentData.email" class="premium-input readonly-field" readonly>
          </div>
          <div class="form-group">
            <label>Phone Number</label>
            <input type="tel" [(ngModel)]="studentData.phone" class="premium-input">
          </div>
          <div class="form-group">
            <label>College</label>
            <input type="text" [(ngModel)]="studentData.college" class="premium-input">
          </div>
          <div class="form-group">
            <label>Department</label>
            <input type="text" [(ngModel)]="studentData.dept" class="premium-input">
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3><i class="fas fa-graduation-cap"></i> Program Details</h3>
        <div class="grid-2">
          <div class="form-group">
            <label>Domain</label>
            <select [(ngModel)]="studentData.domain" class="premium-input">
              <option value="ML">Machine Learning</option>
              <option value="DS">Data Science</option>
              <option value="DA">Data Analytics</option>
            </select>
          </div>
          <div class="form-group">
            <label>Batch</label>
            <input type="text" [(ngModel)]="studentData.batch" class="premium-input">
          </div>
          <div class="form-group">
            <label>Mentor</label>
            <input type="text" [(ngModel)]="studentData.mentor" class="premium-input">
          </div>
          <div class="form-group">
            <label>Program Status</label>
            <select [(ngModel)]="studentData.program" class="premium-input">
              <option value="ML">Standard ML</option>
              <option value="DS">Standard DS</option>
            </select>
          </div>
        </div>
      </section>

      <section class="form-section">
        <h3><i class="fas fa-chart-bar"></i> Performance & Attendance</h3>
        <div class="grid-2">
          <div class="form-group">
            <label>Total Marks</label>
            <input type="number" [(ngModel)]="studentData.total_marks" class="premium-input">
          </div>
          <div class="form-group">
            <label>Attendance Records</label>
            <input type="text" placeholder="e.g. 28/30" class="premium-input">
          </div>
        </div>
      </section>

      <div class="form-footer">
        <button class="btn-premium btn-primary btn-lg" (click)="saveStudent()">
          <i class="fas fa-check-circle"></i> Update Student Record
        </button>
      </div>
    </div>

    <div class="side-info">
      <div class="summary-card premium-card">
        <h3>Quick Summary</h3>
        <div class="summary-item">
          <span>Status</span>
          <span class="badge badge-active">Active</span>
        </div>
        <div class="summary-item">
          <span>Last Updated</span>
          <span>Today</span>
        </div>
        <div class="summary-item">
          <span>Engagement</span>
          <span>High</span>
        </div>
      </div>
    </div>
  </div>
</div>
